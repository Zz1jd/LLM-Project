<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Monthly Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            color: #333;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-top: 1rem;
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 2.5rem;
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .month-year {
            font-size: 1.8rem;
            font-weight: 600;
            color: #3498db;
        }
        
        .nav-buttons button {
            background-color: #177bbe;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 0.5rem;
        }
        
        .nav-buttons button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        
        .weekday {
            text-align: center;
            font-weight: 600;
            color: #5a6869;
            padding: 0.8rem 0;
            font-size: 1.1rem;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            color: #333;
        }
        
        .day:hover {
            background-color: #e3f2fd;
            transform: scale(1.05);
        }
        
        .day.empty {
            background-color: transparent;
            cursor: default;
        }
        
        .day.empty:hover {
            background-color: transparent;
            transform: none;
        }
        
        .day.today {
            background-color: #f4fbff;
            border-color: #3498db;
            color: #3498db;
            font-weight: 600;
        }
        
        .day.selected {
            background-color: #3498db;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }
        
        .day.other-month {
            color: #71777b;
        }
        
        .selection-display {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f9fafb;
            border-radius: 12px;
            text-align: center;
            font-size: 1.4rem;
            color: #2c3e50;
            border-left: 5px solid #3498db;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .selection-display .date {
            color: #3498db;
            font-weight: 600;
        }
        
        .instructions {
            margin-top: 1.5rem;
            text-align: center;
            color: #6c797a;
            font-style: italic;
            line-height: 1.5;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .month-year {
                font-size: 1.5rem;
            }
            
            .day {
                font-size: 1rem;
            }
            
            .selection-display {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <h1>Monthly Calendar</h1>
    
    <div class="container">
        <div class="header-controls">
            <div class="month-year" id="month-year" aria-live="polite">June 2023</div>
            <div class="nav-buttons">
                <button id="prev-month" aria-label="Previous month">&larr; Previous</button>
                <button id="today-btn" aria-label="Go to today">Today</button>
                <button id="next-month" aria-label="Next month">Next &rarr;</button>
            </div>
        </div>
        
        <div class="weekdays" role="rowgroup">
            <div class="weekday" role="columnheader">Sun</div>
            <div class="weekday" role="columnheader">Mon</div>
            <div class="weekday" role="columnheader">Tue</div>
            <div class="weekday" role="columnheader">Wed</div>
            <div class="weekday" role="columnheader">Thu</div>
            <div class="weekday" role="columnheader">Fri</div>
            <div class="weekday" role="columnheader">Sat</div>
        </div>
        
        <div class="calendar-grid" id="calendar-grid" role="grid">
            <!-- Calendar days will be generated by JavaScript -->
        </div>
        
        <div class="selection-display" id="selection-display" aria-live="polite">
            Selected: <span class="date">No date selected</span>
        </div>
        
        <div class="instructions">
            Click on any date to select it. The selected date will be highlighted and displayed above.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Calendar state
            let currentDate = new Date();
            let selectedDate = null;
            
            // DOM elements
            const monthYearElement = document.getElementById('month-year');
            const calendarGridElement = document.getElementById('calendar-grid');
            const selectionDisplayElement = document.getElementById('selection-display');
            const prevMonthButton = document.getElementById('prev-month');
            const nextMonthButton = document.getElementById('next-month');
            const todayButton = document.getElementById('today-btn');
            
            // Initialize calendar
            renderCalendar();
            
            // Event listeners for navigation
            prevMonthButton.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });
            
            nextMonthButton.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });
            
            todayButton.addEventListener('click', () => {
                currentDate = new Date();
                renderCalendar();
            });
            
            // Render the calendar for the current month
            function renderCalendar() {
                // Clear the calendar grid safely
                while (calendarGridElement.firstChild) {
                    calendarGridElement.removeChild(calendarGridElement.firstChild);
                }
                
                // Update month/year display
                const monthNames = [
                    'January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'
                ];
                const monthName = monthNames[currentDate.getMonth()];
                const year = currentDate.getFullYear();
                monthYearElement.textContent = `${monthName} ${year}`;
                
                // Get first day of the month and total days in month
                const firstDayOfMonth = new Date(year, currentDate.getMonth(), 1);
                const lastDayOfMonth = new Date(year, currentDate.getMonth() + 1, 0);
                const daysInMonth = lastDayOfMonth.getDate();
                
                // Get day of week for first day (0 = Sunday, 1 = Monday, etc.)
                const firstDayOfWeek = firstDayOfMonth.getDay();
                
                // Get today's date for comparison
                const today = new Date();
                const isCurrentMonth = today.getMonth() === currentDate.getMonth() && 
                                      today.getFullYear() === currentDate.getFullYear();
                
                // Add empty cells for days before the first day of the month
                for (let i = 0; i < firstDayOfWeek; i++) {
                    const prevMonthDay = new Date(year, currentDate.getMonth(), -firstDayOfWeek + i + 1);
                    const dayElement = createDayElement(prevMonthDay.getDate(), true);
                    calendarGridElement.appendChild(dayElement);
                }
                
                // Add cells for each day of the month
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, currentDate.getMonth(), day);
                    const isToday = isCurrentMonth && day === today.getDate();
                    const isSelected = selectedDate && 
                                      selectedDate.getDate() === day &&
                                      selectedDate.getMonth() === currentDate.getMonth() &&
                                      selectedDate.getFullYear() === currentDate.getFullYear();
                    
                    const dayElement = createDayElement(day, false, isToday, isSelected, date);
                    calendarGridElement.appendChild(dayElement);
                }
                
                // Calculate total cells needed (always 42 to keep consistent grid)
                const totalCells = 42; // 6 rows * 7 columns
                const cellsFilled = firstDayOfWeek + daysInMonth;
                
                // Add empty cells for days after the last day of the month
                for (let i = 0; i < totalCells - cellsFilled; i++) {
                    const nextMonthDay = i + 1;
                    const dayElement = createDayElement(nextMonthDay, true);
                    calendarGridElement.appendChild(dayElement);
                }
                
                // Update selection display
                updateSelectionDisplay();
            }
            
            // Create a day element
            function createDayElement(dayNumber, isOtherMonth, isToday = false, isSelected = false, date = null) {
                const dayElement = document.createElement('div');
                dayElement.setAttribute('role', 'gridcell');
                dayElement.classList.add('day');
                dayElement.textContent = dayNumber;
                
                if (isOtherMonth) {
                    dayElement.classList.add('other-month', 'empty');
                    dayElement.setAttribute('aria-disabled', 'true');
                    return dayElement;
                }
                
                if (isToday) {
                    dayElement.classList.add('today');
                    dayElement.setAttribute('aria-label', `Today, ${dayNumber}`);
                } else {
                    dayElement.setAttribute('aria-label', `Day ${dayNumber}`);
                }
                
                if (isSelected) {
                    dayElement.classList.add('selected');
                    dayElement.setAttribute('aria-selected', 'true');
                } else {
                    dayElement.setAttribute('aria-selected', 'false');
                }
                
                // Add click event to select the date
                dayElement.addEventListener('click', () => {
                    if (date) {
                        selectDate(date);
                    }
                });
                
                return dayElement;
            }
            
            // Select a date
            function selectDate(date) {
                selectedDate = date;
                renderCalendar();
            }
            
            // Update the selection display
            function updateSelectionDisplay() {
                const dateSpan = selectionDisplayElement.querySelector('.date');
                
                if (selectedDate) {
                    const options = { 
                        weekday: 'long', 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric' 
                    };
                    const formattedDate = selectedDate.toLocaleDateString('en-US', options);
                    dateSpan.textContent = formattedDate;
                } else {
                    dateSpan.textContent = 'No date selected';
                }
            }
            
            // Initialize with today's date selected
            selectedDate = new Date();
            updateSelectionDisplay();
        });
    </script>
</body>
</html>
