<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Star Rating Component</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }
        
        .rating-container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease;
        }
        
        .rating-container:hover {
            transform: translateY(-5px);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .description {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .stars-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            font-size: 0;
        }
        
        .star {
            font-size: 48px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: inline-block;
        }
        
        .star:hover {
            transform: scale(1.2);
        }
        
        .star.hovered {
            color: #ffc107;
        }
        
        .star.selected {
            color: #ff9800;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
        }
        
        .rating-result {
            min-height: 60px;
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
            font-size: 18px;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .rating-result.highlight {
            background-color: #e8f5e9;
            color: #2e7d32;
            font-weight: 500;
        }
        
        .reset-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #4a6fa5;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .reset-btn:hover {
            background-color: #385d8a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .instructions {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
            font-style: italic;
        }
        
        @media (max-width: 600px) {
            .rating-container {
                padding: 30px 20px;
            }
            
            .star {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="rating-container">
        <h1>Rate This Product</h1>
        <p class="description">Click on a star to rate this item. Hover over the stars to preview your rating.</p>
        
        <div class="stars-container" id="starsContainer">
            <div class="star" data-value="1">★</div>
            <div class="star" data-value="2">★</div>
            <div class="star" data-value="3">★</div>
            <div class="star" data-value="4">★</div>
            <div class="star" data-value="5">★</div>
        </div>
        
        <div class="rating-result" id="ratingResult">
            Your rating will appear here
        </div>
        
        <button class="reset-btn" id="resetBtn">Reset Rating</button>
        
        <p class="instructions">Click any star to set your rating. Click the reset button to start over.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const starsContainer = document.getElementById('starsContainer');
            const stars = document.querySelectorAll('.star');
            const ratingResult = document.getElementById('ratingResult');
            const resetBtn = document.getElementById('resetBtn');
            
            let selectedRating = 0;
            let isLocked = false;
            
            // Initialize stars
            stars.forEach(star => {
                star.addEventListener('mouseenter', handleStarHover);
                star.addEventListener('mouseleave', handleStarLeave);
                star.addEventListener('click', handleStarClick);
            });
            
            // Reset button functionality
            resetBtn.addEventListener('click', resetRating);
            
            function handleStarHover(e) {
                if (isLocked) return;
                
                const hoveredValue = parseInt(e.target.getAttribute('data-value'));
                
                stars.forEach(star => {
                    const starValue = parseInt(star.getAttribute('data-value'));
                    
                    if (starValue <= hoveredValue) {
                        star.classList.add('hovered');
                    } else {
                        star.classList.remove('hovered');
                    }
                });
            }
            
            function handleStarLeave() {
                if (isLocked) return;
                
                stars.forEach(star => {
                    star.classList.remove('hovered');
                });
            }
            
            function handleStarClick(e) {
                selectedRating = parseInt(e.target.getAttribute('data-value'));
                isLocked = true;
                
                // Update star display
                stars.forEach(star => {
                    const starValue = parseInt(star.getAttribute('data-value'));
                    
                    star.classList.remove('hovered');
                    
                    if (starValue <= selectedRating) {
                        star.classList.add('selected');
                    } else {
                        star.classList.remove('selected');
                    }
                });
                
                // Update rating result display
                ratingResult.innerHTML = `You rated this <strong>${selectedRating}</strong> ${selectedRating === 1 ? 'star' : 'stars'}!`;
                ratingResult.classList.add('highlight');
                
                // Add a little animation effect
                ratingResult.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    ratingResult.style.transform = 'scale(1)';
                }, 200);
            }
            
            function resetRating() {
                selectedRating = 0;
                isLocked = false;
                
                // Reset stars
                stars.forEach(star => {
                    star.classList.remove('selected');
                    star.classList.remove('hovered');
                });
                
                // Reset rating result display
                ratingResult.innerHTML = 'Your rating will appear here';
                ratingResult.classList.remove('highlight');
            }
            
            // Add keyboard navigation support
            document.addEventListener('keydown', function(e) {
                if (e.key >= '1' && e.key <= '5') {
                    const keyValue = parseInt(e.key);
                    const starToClick = document.querySelector(`.star[data-value="${keyValue}"]`);
                    
                    if (starToClick) {
                        starToClick.click();
                        
                        // Add visual feedback for keyboard selection
                        starToClick.style.transform = 'scale(1.3)';
                        setTimeout(() => {
                            starToClick.style.transform = 'scale(1)';
                        }, 200);
                    }
                }
                
                // Reset with 'r' key
                if (e.key === 'r' || e.key === 'R') {
                    resetBtn.click();
                    
                    // Add visual feedback for reset
                    resetBtn.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        resetBtn.style.transform = 'scale(1)';
                    }, 200);
                }
            });
        });
    </script>
</body>
</html>
