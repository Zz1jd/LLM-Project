<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Progress Bar</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }
        
        .upload-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .file-input-container {
            margin-bottom: 25px;
            text-align: left;
        }
        
        .file-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .file-input {
            width: 100%;
            padding: 12px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-input:hover {
            border-color: #4a6cf7;
            background-color: #f0f4ff;
        }
        
        .selected-file {
            margin-top: 10px;
            font-size: 14px;
            color: #4a6cf7;
            font-weight: 500;
        }
        
        .progress-container {
            margin: 30px 0;
            text-align: left;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .progress-label {
            color: #555;
            font-weight: 500;
        }
        
        .progress-percent {
            color: #4a6cf7;
            font-weight: 600;
        }
        
        .progress-bar {
            height: 20px;
            background-color: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a6cf7, #6a8cff);
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background-image: linear-gradient(
                -45deg, 
                rgba(255, 255, 255, 0.2) 25%, 
                transparent 25%, 
                transparent 50%, 
                rgba(255, 255, 255, 0.2) 50%, 
                rgba(255, 255, 255, 0.2) 75%, 
                transparent 75%, 
                transparent
            );
            background-size: 20px 20px;
            animation: moveStripes 1s linear infinite;
        }
        
        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }
        
        .upload-btn {
            background: linear-gradient(to right, #4a6cf7, #6a8cff);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 108, 247, 0.3);
        }
        
        .upload-btn:active {
            transform: translateY(0);
        }
        
        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .result-message {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            background-color: #f0f8ff;
            color: #2e7d32;
            font-weight: 500;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .result-message.show {
            opacity: 1;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <h1>File Upload Progress</h1>
        <p class="subtitle">Select a file and track the upload progress</p>
        
        <div class="file-input-container">
            <label class="file-label" for="fileInput">Choose a file to upload:</label>
            <input type="file" id="fileInput" class="file-input">
            <div id="selectedFileName" class="selected-file"></div>
        </div>
        
        <div class="progress-container">
            <div class="progress-header">
                <span class="progress-label">Upload Progress</span>
                <span id="progressPercent" class="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>
        
        <button id="uploadBtn" class="upload-btn" disabled>Start Upload</button>
        
        <div id="resultMessage" class="result-message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('fileInput');
            const selectedFileName = document.getElementById('selectedFileName');
            const uploadBtn = document.getElementById('uploadBtn');
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            const resultMessage = document.getElementById('resultMessage');
            
            let selectedFile = null;
            
            // Handle file selection
            fileInput.addEventListener('change', function() {
                if (this.files && this.files.length > 0) {
                    selectedFile = this.files[0];
                    selectedFileName.textContent = `Selected: ${selectedFile.name}`;
                    uploadBtn.disabled = false;
                } else {
                    selectedFile = null;
                    selectedFileName.textContent = '';
                    uploadBtn.disabled = true;
                }
                
                // Reset progress and message
                resetProgress();
            });
            
            // Handle upload button click
            uploadBtn.addEventListener('click', function() {
                if (!selectedFile) {
                    alert('Please select a file first.');
                    return;
                }
                
                // Reset previous results
                resetProgress();
                resultMessage.classList.remove('show');
                resultMessage.textContent = '';
                
                // Disable button during upload
                uploadBtn.disabled = true;
                fileInput.disabled = true;
                
                // Simulate upload progress
                simulateUpload(selectedFile);
            });
            
            // Function to simulate file upload
            function simulateUpload(file) {
                let progress = 0;
                const totalSteps = 100;
                const stepTime = 30; // milliseconds per step
                
                // Randomize upload speed a bit for realism
                const speedVariation = Math.random() * 10 + 15;
                
                const uploadInterval = setInterval(() => {
                    // Increment progress
                    progress += 1;
                    
                    // Occasionally pause to simulate network variability
                    if (progress > 30 && progress < 70 && Math.random() < 0.1) {
                        // Simulate a brief pause
                        return;
                    }
                    
                    // Update progress bar
                    updateProgress(progress);
                    
                    // Check if upload is complete
                    if (progress >= totalSteps) {
                        clearInterval(uploadInterval);
                        
                        // Upload complete
                        setTimeout(() => {
                            uploadComplete(file.name);
                        }, 300);
                    }
                }, stepTime + speedVariation);
            }
            
            // Function to update progress bar
            function updateProgress(percent) {
                // Ensure percent is between 0 and 100
                percent = Math.min(100, Math.max(0, percent));
                
                // Update width and percentage text
                progressFill.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
                
                // Change color when complete
                if (percent === 100) {
                    progressFill.style.background = 'linear-gradient(90deg, #2e7d32, #4caf50)';
                }
            }
            
            // Function to handle upload completion
            function uploadComplete(filename) {
                // Show completion message
                resultMessage.innerHTML = `Upload of <strong>${filename}</strong> complete!`;
                resultMessage.classList.add('show');
                
                // Re-enable controls
                uploadBtn.disabled = false;
                fileInput.disabled = false;
                
                // Change button text temporarily
                const originalText = uploadBtn.textContent;
                uploadBtn.textContent = 'Upload Another File';
                
                setTimeout(() => {
                    uploadBtn.textContent = originalText;
                }, 3000);
            }
            
            // Function to reset progress bar
            function resetProgress() {
                progressFill.style.width = '0%';
                progressFill.style.background = 'linear-gradient(90deg, #4a6cf7, #6a8cff)';
                progressPercent.textContent = '0%';
                resultMessage.classList.remove('show');
            }
            
            // Initialize
            resetProgress();
        });
    </script>
</body>
</html>
