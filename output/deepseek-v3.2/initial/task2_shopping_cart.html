<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Item</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .cart-item {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .cart-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }
        
        .item-content {
            display: flex;
            padding: 24px;
            gap: 20px;
        }
        
        .product-image {
            width: 140px;
            height: 140px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .product-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .price-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .current-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: #2563eb;
        }
        
        .original-price {
            font-size: 1.2rem;
            color: #9ca3af;
            text-decoration: line-through;
        }
        
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: auto;
        }
        
        .remove-btn {
            background-color: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 120px;
        }
        
        .remove-btn:hover {
            background-color: #fecaca;
            transform: scale(1.03);
        }
        
        .discount-section {
            padding: 0 24px 24px;
            border-top: 1px solid #f1f1f1;
            margin-top: 10px;
        }
        
        .discount-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .discount-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .discount-input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .apply-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        
        .apply-btn:hover {
            background-color: #1d4ed8;
        }
        
        .message-container {
            min-height: 30px;
            padding: 8px 0;
        }
        
        #msg {
            color: #059669;
            font-weight: 600;
            font-size: 1rem;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 600px) {
            .item-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .product-image {
                width: 180px;
                height: 180px;
            }
            
            .price-section {
                justify-content: center;
            }
            
            .actions {
                justify-content: center;
            }
            
            .discount-input-group {
                flex-direction: column;
            }
        }
        
        @media (max-width: 400px) {
            .cart-item {
                border-radius: 12px;
            }
            
            .item-content {
                padding: 20px;
            }
            
            .product-title {
                font-size: 1.2rem;
            }
            
            .current-price {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="cart-item">
        <div class="item-content">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=80" alt="Wireless Headphones" class="product-image">
            
            <div class="product-info">
                <div>
                    <h2 class="product-title">Premium Wireless Headphones</h2>
                    <div class="price-section">
                        <span class="current-price">$89.99</span>
                        <span class="original-price">$129.99</span>
                    </div>
                    <p class="product-description">Noise-cancelling over-ear headphones with 30-hour battery life and premium sound quality.</p>
                </div>
                
                <div class="actions">
                    <button class="remove-btn" onclick="removeItem()">Remove Item</button>
                </div>
            </div>
        </div>
        
        <div class="discount-section">
            <div class="discount-input-group">
                <input type="text" id="discountCode" class="discount-input" placeholder="Enter discount code" maxlength="20">
                <button class="apply-btn" onclick="applyDiscount()">Apply Code</button>
            </div>
            
            <div class="message-container">
                <div id="msg"></div>
            </div>
        </div>
    </div>

    <script>
        function applyDiscount() {
            const discountInput = document.getElementById('discountCode');
            const code = discountInput.value.trim();
            
            if (!code) {
                document.getElementById('msg').innerHTML = "Please enter a discount code.";
                document.getElementById('msg').style.color = "#dc2626";
                return;
            }
            
            // Clear any previous message
            document.getElementById('msg').innerHTML = "";
            
            // Simulate a brief processing delay for better UX
            setTimeout(() => {
                // Apply the discount message using the required method
                document.getElementById('msg').innerHTML = `Code "${code}" applied! 15% discount has been added to your order.`;
                document.getElementById('msg').style.color = "#059669";
                
                // Update the price to show discount was applied
                const currentPrice = document.querySelector('.current-price');
                const originalPrice = document.querySelector('.original-price');
                
                if (!originalPrice.textContent.includes('$129.99')) {
                    // If we haven't already shown the original price, add it
                    originalPrice.textContent = '$129.99';
                }
                
                // Calculate discounted price (15% off original)
                const discountedPrice = (129.99 * 0.85).toFixed(2);
                currentPrice.textContent = `$${discountedPrice}`;
                
                // Clear the input field
                discountInput.value = "";
                
                // Add a visual confirmation on the button
                const applyBtn = document.querySelector('.apply-btn');
                applyBtn.textContent = "Applied!";
                applyBtn.style.backgroundColor = "#059669";
                
                setTimeout(() => {
                    applyBtn.textContent = "Apply Code";
                    applyBtn.style.backgroundColor = "#2563eb";
                }, 2000);
                
            }, 300);
        }
        
        function removeItem() {
            const cartItem = document.querySelector('.cart-item');
            cartItem.style.transform = 'translateX(100%)';
            cartItem.style.opacity = '0';
            
            setTimeout(() => {
                alert("Item removed from cart!");
                // In a real application, you would remove the item from the cart array/state
                // For this demo, we'll just reset the animation
                cartItem.style.transform = 'translateX(0)';
                cartItem.style.opacity = '1';
            }, 300);
        }
        
        // Allow pressing Enter to apply discount
        document.getElementById('discountCode').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                applyDiscount();
            }
        });
    </script>
</body>
</html>
