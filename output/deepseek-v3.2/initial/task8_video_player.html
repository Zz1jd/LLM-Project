<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #e94560;
            font-size: 2.2rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .video-container {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        
        #videoPlayer {
            width: 100%;
            display: block;
            border-radius: 10px;
        }
        
        .video-placeholder {
            width: 100%;
            height: 450px;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 1.2rem;
            border-radius: 10px;
        }
        
        .video-placeholder i {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #e94560;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.8rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            user-select: none;
        }
        
        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        #playBtn {
            background: linear-gradient(135deg, #0f9b0f, #0a7a0a);
            color: white;
        }
        
        #pauseBtn {
            background: linear-gradient(135deg, #e94560, #c1354a);
            color: white;
        }
        
        #muteBtn {
            background: linear-gradient(135deg, #1f6f8b, #1a5c75);
            color: white;
        }
        
        .video-title {
            text-align: center;
            margin-top: 25px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1.4rem;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .video-title h2 {
            color: #e94560;
            font-weight: 600;
        }
        
        .video-title p {
            color: #aaa;
            font-style: italic;
        }
        
        .status {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            color: #aaa;
            font-size: 1rem;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .video-placeholder {
                height: 300px;
            }
            
            .control-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
            
            .video-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Custom Video Player</h1>
        
        <div class="video-container">
            <video id="videoPlayer" controls style="display: none;">
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            
            <div class="video-placeholder" id="videoPlaceholder">
                <div>▶</div>
                <p>Video will play here</p>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-btn" id="playBtn" title="Play">
                ▶
            </div>
            <div class="control-btn" id="pauseBtn" title="Pause">
                ⏸
            </div>
            <div class="control-btn" id="muteBtn" title="Mute">
                🔊
            </div>
        </div>
        
        <div class="status">
            <div class="status-item">
                <span>Status:</span>
                <span id="statusText">Paused</span>
            </div>
            <div class="status-item">
                <span>Volume:</span>
                <span id="volumeText">100%</span>
            </div>
        </div>
        
        <div class="video-title" id="videoTitle">
            <h2>Big Buck Bunny</h2>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Video elements
            const videoPlayer = document.getElementById('videoPlayer');
            const videoPlaceholder = document.getElementById('videoPlaceholder');
            const videoTitle = document.getElementById('videoTitle');
            
            // Control buttons
            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const muteBtn = document.getElementById('muteBtn');
            
            // Status elements
            const statusText = document.getElementById('statusText');
            const volumeText = document.getElementById('volumeText');
            
            // Video titles for demonstration
            const videoTitles = [
                "Big Buck Bunny",
                "Sintel - Animated Short Film",
                "Tears of Steel",
                "Elephants Dream"
            ];
            
            // Current video index
            let currentVideoIndex = 0;
            
            // Initialize video player
            function initVideoPlayer() {
                // Hide native controls and show video
                videoPlayer.style.display = 'block';
                videoPlaceholder.style.display = 'none';
                
                // Set initial video title
                updateVideoTitle();
                
                // Set initial volume
                videoPlayer.volume = 1.0;
                updateVolumeText();
            }
            
            // Function to update video title display
            function updateVideoTitle() {
                videoTitle.innerHTML = `<h2>Now Playing: ${videoTitles[currentVideoIndex]}</h2>`;
            }
            
            // Function to update volume text
            function updateVolumeText() {
                const volumePercent = Math.round(videoPlayer.volume * 100);
                volumeText.textContent = `${volumePercent}%`;
            }
            
            // Play button click handler
            playBtn.addEventListener('click', function() {
                videoPlayer.play();
                statusText.textContent = 'Playing';
                statusText.style.color = '#0f9b0f';
                
                // Update video title when playing
                updateVideoTitle();
            });
            
            // Pause button click handler
            pauseBtn.addEventListener('click', function() {
                videoPlayer.pause();
                statusText.textContent = 'Paused';
                statusText.style.color = '#e94560';
            });
            
            // Mute button click handler
            muteBtn.addEventListener('click', function() {
                if (videoPlayer.muted) {
                    videoPlayer.muted = false;
                    muteBtn.innerHTML = '🔊';
                    muteBtn.title = 'Mute';
                    muteBtn.style.background = 'linear-gradient(135deg, #1f6f8b, #1a5c75)';
                } else {
                    videoPlayer.muted = true;
                    muteBtn.innerHTML = '🔇';
                    muteBtn.title = 'Unmute';
                    muteBtn.style.background = 'linear-gradient(135deg, #555, #333)';
                }
                updateVolumeText();
            });
            
            // Video event listeners
            videoPlayer.addEventListener('play', function() {
                statusText.textContent = 'Playing';
                statusText.style.color = '#0f9b0f';
            });
            
            videoPlayer.addEventListener('pause', function() {
                statusText.textContent = 'Paused';
                statusText.style.color = '#e94560';
            });
            
            videoPlayer.addEventListener('volumechange', function() {
                updateVolumeText();
                
                // Update mute button if volume is 0
                if (videoPlayer.volume === 0 || videoPlayer.muted) {
                    muteBtn.innerHTML = '🔇';
                    muteBtn.title = 'Unmute';
                    muteBtn.style.background = 'linear-gradient(135deg, #555, #333)';
                } else {
                    muteBtn.innerHTML = '🔊';
                    muteBtn.title = 'Mute';
                    muteBtn.style.background = 'linear-gradient(135deg, #1f6f8b, #1a5c75)';
                }
            });
            
            // Video ended - cycle to next video
            videoPlayer.addEventListener('ended', function() {
                // Cycle to next video title (for demo purposes)
                currentVideoIndex = (currentVideoIndex + 1) % videoTitles.length;
                
                // In a real app, you would load a new video source here
                // For this demo, we'll just update the title and restart the current video
                updateVideoTitle();
                
                // Reset and play again after a short delay
                setTimeout(() => {
                    videoPlayer.currentTime = 0;
                    videoPlayer.play();
                }, 1000);
            });
            
            // Initialize the player when placeholder is clicked
            videoPlaceholder.addEventListener('click', initVideoPlayer);
            
            // Also initialize if video can play
            videoPlayer.addEventListener('canplay', function() {
                // Only initialize if placeholder is still visible
                if (videoPlaceholder.style.display !== 'none') {
                    initVideoPlayer();
                }
            });
            
            // Initialize player automatically after a short delay
            setTimeout(initVideoPlayer, 500);
        });
    </script>
</body>
</html>
