<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Checkout Form</title>
    <style>
        :root {
            --primary-color: #0072ed;
            --secondary-color: #5a6268;
            --background-color: #f4f7f6;
            --form-background: #ffffff;
            --text-color: #333;
            --border-color: #dee2e6;
            --step-active-color: var(--primary-color);
            --step-inactive-color: #71777d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .checkout-container {
            background-color: var(--form-background);
            padding: 2rem 3rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        /* Progress Indicator */
        .progress-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .progress-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--border-color);
            transform: translateY(-50%);
            z-index: 1;
        }

        .progress-indicator .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 0%;
            height: 4px;
            background-color: var(--step-active-color);
            transform: translateY(-50%);
            z-index: 2;
            transition: width 0.4s ease;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 3;
            background-color: var(--form-background);
            padding: 0 10px;
        }

        .step .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--step-inactive-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border: 4px solid var(--border-color);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .step .step-label {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--secondary-color);
            transition: color 0.4s ease;
        }

        .step.active .step-number {
            background-color: var(--step-active-color);
            border-color: var(--step-active-color);
        }

        .step.active .step-label {
            color: var(--primary-color);
            font-weight: bold;
        }

        /* Form Steps */
        .form-step {
            display: none;
            animation: fadeIn 0.5s;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
        }
        
        .input-group {
            display: flex;
            gap: 1rem;
        }
        
        .input-group .form-group {
            flex: 1;
        }

        /* Navigation Buttons */
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }
        
        .btn:active {
            transform: translateY(1px);
        }

        #prev-btn {
            background-color: var(--secondary-color);
            color: white;
        }
        
        #prev-btn:hover {
            background-color: #4a4f54;
        }

        #next-btn {
            background-color: var(--primary-color);
            color: white;
        }
        
        #next-btn:hover {
            background-color: #005cbf;
        }
        
        #prev-btn[disabled] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
        
        /* Success Message */
        #success-message {
            text-align: center;
            padding: 2rem;
            display: none;
        }
        #success-message h2 {
            color: #28a745;
            font-size: 2rem;
        }
        #success-message p {
            font-size: 1.2rem;
        }

    </style>
</head>
<body>

    <div class="checkout-container">
        <h1>Checkout</h1>

        <div class="progress-indicator" role="tablist" aria-label="Checkout steps">
            <div class="progress-line"></div>
            <div class="step active" data-step="1" role="tab" aria-selected="true" aria-controls="step-1">
                <div class="step-number">1</div>
                <div class="step-label">Shipping</div>
            </div>
            <div class="step" data-step="2" role="tab" aria-selected="false" aria-controls="step-2">
                <div class="step-number">2</div>
                <div class="step-label">Payment</div>
            </div>
        </div>

        <form id="checkout-form" novalidate>
            <!-- Step 1: Shipping Address -->
            <div class="form-step active" id="step-1" role="tabpanel">
                <h2 id="step-1-title">Shipping Address</h2>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" autocomplete="street-address" required>
                </div>
                <div class="input-group">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" autocomplete="address-level2" required>
                    </div>
                    <div class="form-group">
                        <label for="zip">ZIP Code</label>
                        <input type="text" id="zip" name="zip" pattern="[0-9]{5}" autocomplete="postal-code" required>
                    </div>
                </div>
            </div>

            <!-- Step 2: Payment Details -->
            <div class="form-step" id="step-2" role="tabpanel">
                <h2 id="step-2-title">Payment Details</h2>
                <div class="form-group">
                    <label for="cardName">Name on Card</label>
                    <input type="text" id="cardName" name="cardName" autocomplete="cc-name" required>
                </div>
                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                    <input type="text" id="cardNumber" name="cardNumber" pattern="[0-9]{13,16}" placeholder="•••• •••• •••• ••••" autocomplete="cc-number" required>
                </div>
                <div class="input-group">
                    <div class="form-group">
                        <label for="expiryDate">Expiry Date</label>
                        <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" pattern="(0[1-9]|1[0-2])\/?([0-9]{2})" autocomplete="cc-exp" required>
                    </div>
                    <div class="form-group">
                        <label for="cvc">CVC</label>
                        <input type="text" id="cvc" name="cvc" pattern="[0-9]{3,4}" placeholder="123" autocomplete="cc-csc" required>
                    </div>
                </div>
            </div>
            
            <div id="success-message" role="alert" aria-live="assertive">
                <h2>✓ Thank You!</h2>
                <p>Your order has been placed successfully.</p>
            </div>

            <div class="navigation-buttons">
                <button type="button" id="prev-btn" class="btn" disabled>Previous</button>
                <button type="submit" id="next-btn" class="btn">Next</button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const form = document.getElementById('checkout-form');
            const formSteps = Array.from(document.querySelectorAll('.form-step'));
            const progressSteps = Array.from(document.querySelectorAll('.progress-indicator .step'));
            const progressLine = document.querySelector('.progress-indicator .progress-line');
            const successMessage = document.getElementById('success-message');
            const navigationButtons = document.querySelector('.navigation-buttons');
            const mainHeading = document.querySelector('h1');

            let currentStep = 0;

            const updateForm = () => {
                // Update form steps visibility
                formSteps.forEach((step, index) => {
                    step.classList.toggle('active', index === currentStep);
                });

                // Update progress indicator
                progressSteps.forEach((step, index) => {
                    const isActive = index <= currentStep;
                    step.classList.toggle('active', isActive);
                    step.setAttribute('aria-selected', index === currentStep);
                });
                
                // Update progress line
                const activeSteps = document.querySelectorAll('.progress-indicator .step.active');
                const progressWidth = ((activeSteps.length - 1) / (progressSteps.length - 1)) * 100;
                progressLine.style.width = `${progressWidth}%`;

                // Update button states
                prevBtn.disabled = currentStep === 0;
                if (currentStep === formSteps.length - 1) {
                    nextBtn.textContent = 'Submit Payment';
                } else {
                    nextBtn.textContent = 'Next';
                }
            };

            const validateStep = () => {
                const currentFormStep = formSteps[currentStep];
                const inputs = currentFormStep.querySelectorAll('input[required]');
                let isValid = true;
                inputs.forEach(input => {
                    if (!input.checkValidity()) {
                        input.reportValidity();
                        isValid = false;
                    }
                });
                return isValid;
            };

            prevBtn.addEventListener('click', () => {
                if (currentStep > 0) {
                    currentStep--;
                    updateForm();
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                if (!validateStep()) {
                    return;
                }

                if (currentStep < formSteps.length - 1) {
                    currentStep++;
                    updateForm();
                } else {
                    // Handle final form submission
                    form.style.display = 'none';
                    navigationButtons.style.display = 'none';
                    document.querySelector('.progress-indicator').style.display = 'none';
                    mainHeading.style.display = 'none';
                    successMessage.style.display = 'block';
                    console.log('Form submitted!');
                }
            });

            // Initial setup
            updateForm();
        });
    </script>

</body>
</html>
