<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>
    <style>
        /* Basic Reset and Body Styling */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Carousel Container */
        .carousel-container {
            position: relative;
            max-width: 800px;
            width: 100%;
            margin: auto;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        /* Slides Wrapper */
        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        /* Individual Slide */
        .carousel-slide {
            min-width: 100%;
            position: relative;
        }
        
        .carousel-slide:focus {
            outline: 2px solid #005a9c;
            outline-offset: -4px;
        }

        .carousel-slide img {
            width: 100%;
            display: block;
            vertical-align: middle;
        }

        /* Navigation Buttons */
        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -28px;
            color: white;
            font-weight: bold;
            font-size: 22px;
            transition: 0.4s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0, 0, 0, 0.4);
            border: none;
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover,
        .next:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        /* Dot Indicators */
        .carousel-dots {
            text-align: center;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        .dot {
            cursor: pointer;
            height: 13px;
            width: 13px;
            margin: 0 5px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.4s ease;
            padding: 0;
        }

        .active,
        .dot:hover {
            background-color: #ffffff;
        }

        /* Visually hidden class for screen reader announcements */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>

    <div class="carousel-container" role="region" aria-roledescription="carousel" aria-label="Image Carousel">
        <div class="carousel-slides">
            <div id="carousel-slide-1" class="carousel-slide" role="tabpanel" aria-roledescription="slide">
                <img src="https://picsum.photos/id/10/800/450" alt="Forest path">
            </div>
            <div id="carousel-slide-2" class="carousel-slide" role="tabpanel" aria-roledescription="slide">
                <img src="https://picsum.photos/id/20/800/450" alt="Misty mountains">
            </div>
            <div id="carousel-slide-3" class="carousel-slide" role="tabpanel" aria-roledescription="slide">
                <img src="https://picsum.photos/id/30/800/450" alt="City skyline at night">
            </div>
            <div id="carousel-slide-4" class="carousel-slide" role="tabpanel" aria-roledescription="slide">
                <img src="https://picsum.photos/id/40/800/450" alt="Laptop on a desk">
            </div>
            <div id="carousel-slide-5" class="carousel-slide" role="tabpanel" aria-roledescription="slide">
                <img src="https://picsum.photos/id/50/800/450" alt="Ocean waves">
            </div>
        </div>

        <!-- Navigation Buttons -->
        <button type="button" class="prev" aria-label="Previous slide">&#10094;</button>
        <button type="button" class="next" aria-label="Next slide">&#10095;</button>

        <!-- Dot indicators -->
        <div class="carousel-dots" role="tablist" aria-label="Slide controls">
            <!-- Dots will be generated by JavaScript -->
        </div>
        
        <!-- Live region for screen reader announcements -->
        <div class="carousel-liveregion visually-hidden" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Get DOM elements
            const carousel = document.querySelector('.carousel-container');
            const slidesContainer = document.querySelector('.carousel-slides');
            const slides = document.querySelectorAll('.carousel-slide');
            const nextBtn = document.querySelector('.next');
            const prevBtn = document.querySelector('.prev');
            const dotsContainer = document.querySelector('.carousel-dots');
            const liveRegion = document.querySelector('.carousel-liveregion');

            let currentIndex = 0;
            const totalSlides = slides.length;

            // --- Create Dot Indicators ---
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('button');
                dot.type = 'button';
                dot.id = `carousel-dot-${i + 1}`;
                dot.classList.add('dot');
                dot.setAttribute('data-slide-to', i);
                dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
                dot.setAttribute('role', 'tab');
                dot.setAttribute('aria-controls', `carousel-slide-${i + 1}`);
                dotsContainer.appendChild(dot);
            }

            // Get all created dots
            const dots = document.querySelectorAll('.dot');

            // --- Set up slide ARIA attributes ---
            slides.forEach((slide, index) => {
                slide.setAttribute('tabindex', '-1'); // Make slide focusable
                slide.setAttribute('aria-labelledby', `carousel-dot-${index + 1}`);
            });

            // --- Core Function to Update Carousel ---
            function updateCarousel(isFirstLoad = false) {
                // Move the slide container
                slidesContainer.style.transform = `translateX(-${currentIndex * 100}%)`;

                // Update slide visibility for screen readers
                slides.forEach((slide, index) => {
                    const isActive = index === currentIndex;
                    slide.setAttribute('aria-hidden', !isActive);
                    if (isActive) {
                        slide.removeAttribute('hidden');
                    } else {
                        slide.setAttribute('hidden', '');
                    }
                });

                // Update active dot and ARIA attributes
                dots.forEach((dot, index) => {
                    const isActive = index === currentIndex;
                    dot.classList.toggle('active', isActive);
                    dot.setAttribute('aria-selected', isActive);
                });

                // On user interaction, move focus and announce the new slide
                if (!isFirstLoad) {
                    slides[currentIndex].focus();
                    liveRegion.textContent = `Slide ${currentIndex + 1} of ${totalSlides}`;
                }
            }

            // --- Navigation Functions ---
            function showNextSlide() {
                currentIndex = (currentIndex + 1) % totalSlides;
                updateCarousel();
            }

            function showPrevSlide() {
                currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
                updateCarousel();
            }

            // --- Event Listeners ---
            nextBtn.addEventListener('click', showNextSlide);
            prevBtn.addEventListener('click', showPrevSlide);

            // Add click event to each dot
            dots.forEach(dot => {
                dot.addEventListener('click', (e) => {
                    const targetIndex = e.currentTarget.getAttribute('data-slide-to');
                    if (targetIndex) {
                        currentIndex = parseInt(targetIndex, 10);
                        updateCarousel();
                    }
                });
            });
            
            // Keyboard navigation for the carousel
            carousel.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    e.preventDefault(); // Prevent page scroll
                    showNextSlide();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault(); // Prevent page scroll
                    showPrevSlide();
                }
            });

            // --- Initialize Carousel ---
            updateCarousel(true);
        });
    </script>

</body>
</html>
