<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --primary-color: #5b64c4;
            --primary-hover: #4a52a0;
            --text-color: #333;
            --border-color: #ddd;
            --completed-color: #888;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --error-color: #d9534f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .todo-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: 0 4px 10px var(--shadow-color);
            padding: 25px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #task-input {
            flex-grow: 1;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            transition: border-color 0.2s;
        }

        #task-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #add-button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #add-button:hover {
            background-color: var(--primary-hover);
        }

        #task-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #task-list li {
            padding: 12px;
            background-color: #fdfdff;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            user-select: none; /* Prevents text selection on click */
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
        }
        
        #task-list li:first-child {
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        #task-list li:last-child {
            border-bottom: none;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        #task-list li:hover {
            background-color: #f0f2ff;
        }

        #task-list li:focus {
            outline: 2px solid var(--primary-color);
            outline-offset: -2px;
        }

        #task-list li.completed {
            text-decoration: line-through;
            color: var(--completed-color);
            background-color: #f9f9f9;
        }

        /* A11y: Visually hide elements but keep them accessible to screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* A11y: Style for accessible error messages */
        #error-container {
            color: var(--error-color);
            margin-top: -10px;
            margin-bottom: 10px;
            font-size: 14px;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1 id="list-heading">My To-Do List</h1>
        <form id="add-task-form" class="input-area" novalidate>
            <label for="task-input" class="sr-only">Add a new task</label>
            <input type="text" id="task-input" placeholder="Add a new task...">
            <button type="submit" id="add-button">Add</button>
        </form>
        <div id="error-container" aria-live="polite"></div>
        <ul id="task-list" aria-labelledby="list-heading">
            <!-- Tasks will be inserted here -->
        </ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const taskInput = document.getElementById('task-input');
            const form = document.getElementById('add-task-form');
            const taskList = document.getElementById('task-list');
            const errorContainer = document.getElementById('error-container');

            // Helper function to toggle the state of a task item
            const toggleTaskState = (taskItem) => {
                const isCompleted = taskItem.classList.toggle('completed');
                taskItem.setAttribute('aria-checked', isCompleted);
            };

            // Function to add a new task
            const addTask = () => {
                const taskText = taskInput.value.trim();
                
                // Clear previous error states
                errorContainer.textContent = '';
                taskInput.removeAttribute('aria-invalid');
                taskInput.removeAttribute('aria-describedby');

                if (taskText === '') {
                    // A11y: Show error message in the DOM instead of alert()
                    errorContainer.textContent = 'Please enter a task.';
                    taskInput.setAttribute('aria-invalid', 'true');
                    taskInput.setAttribute('aria-describedby', 'error-container');
                    taskInput.focus();
                    return;
                }

                const li = document.createElement('li');
                
                // A11y: Add role, state, and focusability to make the interactive list item accessible
                li.setAttribute('role', 'checkbox');
                li.setAttribute('aria-checked', 'false');
                li.setAttribute('tabindex', '0');
                
                // Security: Use textContent to safely insert user input as text, preventing DOM-XSS
                li.textContent = taskText;

                taskList.appendChild(li);

                taskInput.value = '';
                taskInput.focus();
            };

            // Function to handle clicks on the task list (for toggling completion)
            const handleTaskListClick = (event) => {
                if (event.target && event.target.tagName === 'LI') {
                    toggleTaskState(event.target);
                }
            };

            // A11y: Function to handle keyboard events for task list items
            const handleTaskListKeyDown = (event) => {
                if (event.target && event.target.tagName === 'LI') {
                    // Toggle on Enter or Space key press, which is standard for checkbox-like controls
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault(); // Prevent spacebar from scrolling the page
                        toggleTaskState(event.target);
                    }
                }
            };

            // Event Listeners
            // Security/A11y: Use form submission which handles button clicks and Enter key presses
            form.addEventListener('submit', (event) => {
                event.preventDefault(); // Prevent default form submission
                addTask();
            });

            // Use event delegation on the parent UL for better performance and accessibility
            taskList.addEventListener('click', handleTaskListClick);
            taskList.addEventListener('keydown', handleTaskListKeyDown);
        });
    </script>

</body>
</html>
