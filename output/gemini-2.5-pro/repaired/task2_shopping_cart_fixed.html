<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Item</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        :root {
            --primary-color: #0072ed;
            --primary-hover-color: #005cb8;
            --danger-color: #dc3545;
            --danger-hover-color: #c82333;
            --success-color: #28a745;
            --light-gray-color: #f8f9fa;
            --medium-gray-color: #dee2e6;
            --dark-gray-color: #6c757d;
            --text-color: #212529;
            --white-color: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-gray-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .cart-item-container {
            background-color: var(--white-color);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 24px;
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .product-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .product-details {
            flex-grow: 1;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 500;
            color: var(--dark-gray-color);
        }

        .remove-btn {
            background-color: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
            white-space: nowrap;
        }

        .remove-btn:hover {
            background-color: var(--danger-color);
            color: var(--white-color);
        }

        .discount-section {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            border-top: 1px solid var(--medium-gray-color);
            padding-top: 20px;
        }

        .discount-input {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid var(--medium-gray-color);
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.2s ease;
        }

        .discount-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .apply-btn {
            background-color: var(--primary-color);
            color: var(--white-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .apply-btn:hover {
            background-color: var(--primary-hover-color);
        }

        #msg {
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--success-color);
            min-height: 1.2em; /* Prevents layout shift */
            transition: color 0.3s ease;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }

            .product-image {
                width: 100%;
                height: 180px;
            }

            .product-details {
                width: 100%;
            }
            
            .remove-btn {
                align-self: flex-end;
                margin-top: -40px; /* Position it relative to the details */
            }

            .discount-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="cart-item-container">
        <div class="cart-item">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=400&q=80" alt="Premium Analog Watch" class="product-image">
            <div class="product-details">
                <h3 class="product-title">Premium Analog Watch</h3>
                <p class="product-price">$149.99</p>
            </div>
            <button class="remove-btn" aria-label="Remove Premium Analog Watch">Remove</button>
        </div>
        <form class="discount-section" id="discount-form" novalidate>
            <label for="discount-code-input" class="visually-hidden">Discount Code</label>
            <input type="text" id="discount-code-input" class="discount-input" placeholder="Enter discount code" name="discount-code">
            <button type="submit" id="apply-btn" class="apply-btn">Apply</button>
        </form>
        <p id="msg" role="status" aria-live="polite"></p>
    </div>

    <script>
        function applyDiscount() {
            const codeInput = document.getElementById('discount-code-input');
            const code = codeInput.value.trim();
            const msgElement = document.getElementById('msg');

            // Reset state for every submission
            msgElement.textContent = '';
            codeInput.removeAttribute('aria-invalid');
            codeInput.removeAttribute('aria-describedby');

            if (code) {
                // The following code is safe from DOM-XSS because it uses textContent
                // to insert user-provided data, which does not parse HTML.
                const b = document.createElement('b');
                b.textContent = code;

                msgElement.append('Code ', b, ' applied!');
                msgElement.style.color = 'var(--success-color)';
            } else {
                msgElement.textContent = 'Please enter a valid discount code.';
                msgElement.style.color = 'var(--danger-color)';
                // Enhance accessibility by linking the error message to the input
                codeInput.setAttribute('aria-invalid', 'true');
                codeInput.setAttribute('aria-describedby', 'msg');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const discountForm = document.getElementById('discount-form');
            if (discountForm) {
                discountForm.addEventListener('submit', (event) => {
                    event.preventDefault();
                    applyDiscount();
                });
            }
        });
    </script>

</body>
</html>
