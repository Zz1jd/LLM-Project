<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        body {
            background-color: #2c3e50;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            background-color: #000;
        }

        video {
            width: 100%;
            display: block;
            cursor: pointer;
        }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            padding: 10px 15px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
            z-index: 21;
            gap: 15px;
        }

        .video-container:hover .custom-controls,
        .video-container:focus-within .custom-controls {
            opacity: 1;
            visibility: visible;
        }

        .custom-controls button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .custom-controls button svg {
            width: 26px;
            height: 26px;
            fill: #ffffff;
            transition: transform 0.2s ease;
        }
        
        .custom-controls button:hover svg {
            transform: scale(1.1);
        }

        .hidden {
            display: none;
        }

        .volume-controls {
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 5px;
            background: #555;
            border-radius: 5px;
        }
        input[type="range"]::-moz-range-track {
            height: 5px;
            background: #555;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -5px; /* Center thumb */
            width: 15px;
            height: 15px;
            background: #ffffff;
            border-radius: 50%;
        }
        input[type="range"]::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: #ffffff;
            border-radius: 50%;
            border: none;
        }

        #volume-slider {
            width: 100px;
            margin-left: 5px;
        }

        #progress-bar {
            flex-grow: 1;
        }

        .time-display {
            color: #fff;
            font-size: 14px;
            user-select: none;
            white-space: nowrap;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>

    <div class="video-container" id="video-container">
        <div id="player-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
        <video id="custom-video" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" poster="https://peach.blender.org/wp-content/uploads/title_anouncement.jpg?x11217" tabindex="0" aria-label="Big Buck Bunny video player"></video>
        <div class="custom-controls">
            <button id="play-pause-btn" aria-label="Play">
                <svg id="play-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M8 5v14l11-7z"></path>
                </svg>
                <svg id="pause-icon" class="hidden" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
                </svg>
            </button>
            <div class="volume-controls">
                <button id="mute-btn" aria-label="Mute">
                    <svg id="volume-high-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"></path>
                    </svg>
                    <svg id="volume-mute-icon" class="hidden" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"></path>
                    </svg>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Volume">
            </div>
            <div class="time-display">
                <span id="current-time">00:00</span> / <span id="total-duration">00:00</span>
            </div>
            <input type="range" id="progress-bar" value="0" min="0" step="0.1" aria-label="Video progress">
            <button id="fullscreen-btn" aria-label="Enter fullscreen">
                <svg id="fullscreen-enter-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"></path>
                </svg>
                <svg id="fullscreen-exit-icon" class="hidden" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('custom-video');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const muteBtn = document.getElementById('mute-btn');
            const volumeHighIcon = document.getElementById('volume-high-icon');
            const volumeMuteIcon = document.getElementById('volume-mute-icon');
            const volumeSlider = document.getElementById('volume-slider');
            const progressBar = document.getElementById('progress-bar');
            const currentTimeEl = document.getElementById('current-time');
            const totalDurationEl = document.getElementById('total-duration');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            const fullscreenEnterIcon = document.getElementById('fullscreen-enter-icon');
            const fullscreenExitIcon = document.getElementById('fullscreen-exit-icon');
            const announcer = document.getElementById('player-announcer');

            function announce(message) {
                announcer.textContent = message;
                setTimeout(() => { announcer.textContent = ''; }, 1000);
            }

            function togglePlayPause() {
                if (video.paused || video.ended) {
                    video.play().catch(error => console.error("Playback failed:", error));
                } else {
                    video.pause();
                }
            }

            function updatePlayPauseIcon() {
                const isPaused = video.paused || video.ended;
                playIcon.classList.toggle('hidden', !isPaused);
                pauseIcon.classList.toggle('hidden', isPaused);
                playPauseBtn.setAttribute('aria-label', isPaused ? 'Play' : 'Pause');
                if (video.readyState > 0) {
                    announce(isPaused ? 'Paused' : 'Playing');
                }
            }

            function toggleMute() {
                video.muted = !video.muted;
                announce(video.muted ? 'Muted' : 'Unmuted');
            }

            function updateVolumeUI() {
                const isMuted = video.muted || video.volume === 0;
                volumeSlider.value = isMuted ? 0 : video.volume;
                volumeHighIcon.classList.toggle('hidden', isMuted);
                volumeMuteIcon.classList.toggle('hidden', !isMuted);
                muteBtn.setAttribute('aria-label', isMuted ? 'Unmute' : 'Mute');
                const volumePercent = Math.round(video.volume * 100);
                volumeSlider.setAttribute('aria-valuetext', isMuted ? 'Muted' : `${volumePercent}% volume`);
            }

            function handleVolumeChange() {
                video.volume = volumeSlider.value;
                video.muted = video.volume === 0;
            }

            function formatTime(timeInSeconds) {
                const date = new Date(null);
                date.setSeconds(timeInSeconds);
                const timeString = date.toISOString();
                // For videos longer than 1 hour, show HH:MM:SS, otherwise MM:SS
                return timeString.startsWith('00:00:') ? timeString.substr(14, 5) : timeString.substr(11, 8);
            }

            function updateTimeAndProgress() {
                const formattedTime = formatTime(video.currentTime);
                currentTimeEl.textContent = formattedTime;
                progressBar.value = video.currentTime;
                progressBar.setAttribute('aria-valuenow', video.currentTime);
                progressBar.setAttribute('aria-valuetext', `Current time: ${formattedTime}`);
            }

            function initializeVideo() {
                const formattedDuration = formatTime(video.duration);
                totalDurationEl.textContent = formattedDuration;
                progressBar.max = video.duration;
                progressBar.setAttribute('aria-valuemin', '0');
                progressBar.setAttribute('aria-valuemax', video.duration);
                updateVolumeUI();
                updatePlayPauseIcon();
            }

            function handleProgressChange() {
                video.currentTime = progressBar.value;
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    videoContainer.requestFullscreen().catch(err => {
                        console.error(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            }

            function updateFullscreenIcon() {
                const isFullscreen = !!document.fullscreenElement;
                fullscreenEnterIcon.classList.toggle('hidden', isFullscreen);
                fullscreenExitIcon.classList.toggle('hidden', !isFullscreen);
                fullscreenBtn.setAttribute('aria-label', isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen');
            }

            playPauseBtn.addEventListener('click', togglePlayPause);
            video.addEventListener('click', togglePlayPause);
            video.addEventListener('keydown', (event) => {
                if (event.key === ' ' || event.key === 'Spacebar') {
                    event.preventDefault();
                    togglePlayPause();
                }
            });
            video.addEventListener('play', updatePlayPauseIcon);
            video.addEventListener('pause', updatePlayPauseIcon);
            video.addEventListener('ended', updatePlayPauseIcon);
            muteBtn.addEventListener('click', toggleMute);
            volumeSlider.addEventListener('input', handleVolumeChange);
            video.addEventListener('volumechange', updateVolumeUI);
            video.addEventListener('loadedmetadata', initializeVideo);
            video.addEventListener('timeupdate', updateTimeAndProgress);
            progressBar.addEventListener('input', handleProgressChange);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            document.addEventListener('fullscreenchange', updateFullscreenIcon);
        });
    </script>

</body>
</html>
