<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <style>
        :root {
            --card-bg: #ffffff;
            --body-bg: #f0f4f8;
            --primary-text: #2d3748;
            --secondary-text: #68778d;
            --icon-color: #a0aec0;
            --icon-hover-color: #4a5568;
            --avatar-border: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --card-bg: #2d3748;
                --body-bg: #1a202c;
                --primary-text: #e2e8f0;
                --secondary-text: #a0aec0;
                --icon-color: #718096;
                --icon-hover-color: #e2e8f0;
                --avatar-border: #4a5568;
                --shadow-color: rgba(0, 0, 0, 0.4);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--primary-text);
            display: grid;
            place-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .profile-card {
            width: 340px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            padding: 40px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--avatar-border);
            margin-bottom: 20px;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .user-name {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-text);
        }

        .user-bio {
            font-size: 1rem;
            color: var(--secondary-text);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .social-links {
            display: flex;
            gap: 24px;
        }

        .social-links a {
            display: inline-block;
            text-decoration: none;
        }

        .social-links svg {
            width: 24px;
            height: 24px;
            fill: var(--icon-color);
            transition: fill 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover svg,
        .social-links a:focus svg {
            fill: var(--icon-hover-color);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://i.pravatar.cc/150?img=58" alt="Jane Doe" class="avatar">
        <h1 class="user-name">Jane Doe</h1>
        <p class="user-bio" id="user-bio-placeholder">Loading bio...</p>
        <div class="social-links">
            <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" aria-label="Twitter Profile">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.39.106-.803.163-1.227.163-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/>
                </svg>
            </a>
            <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bioElement = document.getElementById('user-bio-placeholder');
            
            if (bioElement) {
                // Clear the "Loading..." text safely
                bioElement.textContent = '';

                // Create and append nodes to avoid DOM-XSS
                const text1 = document.createTextNode("Creative Coder & Design Thinker. I build ");
                const strongEl = document.createElement('strong');
                strongEl.textContent = 'accessible';
                const text2 = document.createTextNode(", ");
                const emEl = document.createElement('em');
                emEl.textContent = 'human-centered';
                const text3 = document.createTextNode(" products. Currently exploring the intersection of art and technology.");

                bioElement.appendChild(text1);
                bioElement.appendChild(strongEl);
                bioElement.appendChild(text2);
                bioElement.appendChild(emEl);
                bioElement.appendChild(text3);
            }
        });
    </script>

</body>
</html>
