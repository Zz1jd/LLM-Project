<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --primary-color: #5b64c4;
            --primary-hover: #4a52a0;
            --text-color: #333;
            --border-color: #ddd;
            --completed-color: #888;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .todo-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: 0 4px 10px var(--shadow-color);
            padding: 25px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #task-input {
            flex-grow: 1;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            transition: border-color 0.2s;
        }

        #task-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #add-button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #add-button:hover {
            background-color: var(--primary-hover);
        }

        #task-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #task-list li {
            padding: 12px;
            background-color: #fdfdff;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            user-select: none; /* Prevents text selection on click */
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
        }
        
        #task-list li:first-child {
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        #task-list li:last-child {
            border-bottom: none;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        #task-list li:hover {
            background-color: #f0f2ff;
        }

        #task-list li.completed {
            text-decoration: line-through;
            color: var(--completed-color);
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>My To-Do List</h1>
        <div class="input-area">
            <input type="text" id="task-input" placeholder="Add a new task...">
            <button id="add-button">Add</button>
        </div>
        <ul id="task-list">
            <!-- Tasks will be inserted here -->
        </ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const taskInput = document.getElementById('task-input');
            const addButton = document.getElementById('add-button');
            const taskList = document.getElementById('task-list');

            // Function to add a new task
            const addTask = () => {
                const taskText = taskInput.value.trim();

                if (taskText === '') {
                    alert('Please enter a task.');
                    return;
                }

                // Sanitize input to prevent HTML injection
                const sanitizedText = document.createElement('div');
                sanitizedText.innerText = taskText;
                
                const taskHTML = `<li>${sanitizedText.innerHTML}</li>`;

                // Use insertAdjacentHTML to add the new task
                taskList.insertAdjacentHTML('beforeend', taskHTML);

                // Clear the input field and set focus
                taskInput.value = '';
                taskInput.focus();
            };

            // Function to handle clicks on the task list (for toggling completion)
            const handleTaskListClick = (event) => {
                // Use event delegation to check if an LI was clicked
                if (event.target && event.target.tagName === 'LI') {
                    event.target.classList.toggle('completed');
                }
            };

            // Event Listeners
            addButton.addEventListener('click', addTask);
            
            // Allow adding tasks by pressing the "Enter" key
            taskInput.addEventListener('keypress', (event) => {
                if (event.key === 'Enter') {
                    addTask();
                }
            });

            // Add a single event listener to the parent UL for toggling tasks
            taskList.addEventListener('click', handleTaskListClick);
        });
    </script>

</body>
</html>
