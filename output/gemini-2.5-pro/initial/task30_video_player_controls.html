<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        body {
            background-color: #2c3e50;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            background-color: #000;
        }

        video {
            width: 100%;
            display: block;
            cursor: pointer;
        }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            padding: 10px 15px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
            z-index: 21;
        }

        .video-container:hover .custom-controls {
            opacity: 1;
            visibility: visible;
        }

        .custom-controls button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }

        .custom-controls button svg {
            width: 26px;
            height: 26px;
            fill: #ffffff;
            transition: transform 0.2s ease;
        }
        
        .custom-controls button:hover svg {
            transform: scale(1.1);
        }

        .hidden {
            display: none;
        }

        .volume-controls {
            display: flex;
            align-items: center;
        }

        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 5px;
            background: #555;
            outline: none;
            opacity: 0.8;
            transition: opacity .2s;
            border-radius: 5px;
            margin-left: 5px;
        }

        #volume-slider:hover {
            opacity: 1;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #ffffff;
            cursor: pointer;
            border-radius: 50%;
        }

        #volume-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: #ffffff;
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="custom-video" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" poster="https://peach.blender.org/wp-content/uploads/title_anouncement.jpg?x11217"></video>
        <div class="custom-controls">
            <button id="play-pause-btn" title="Play/Pause">
                <svg id="play-icon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"></path>
                </svg>
                <svg id="pause-icon" class="hidden" viewBox="0 0 24 24">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
                </svg>
            </button>
            <div class="volume-controls">
                <button id="mute-btn" title="Mute/Unmute">
                    <svg id="volume-high-icon" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"></path>
                    </svg>
                    <svg id="volume-mute-icon" class="hidden" viewBox="0 0 24 24">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"></path>
                    </svg>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" title="Volume">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('custom-video');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const muteBtn = document.getElementById('mute-btn');
            const volumeHighIcon = document.getElementById('volume-high-icon');
            const volumeMuteIcon = document.getElementById('volume-mute-icon');
            const volumeSlider = document.getElementById('volume-slider');

            // --- Play/Pause Functionality ---
            function togglePlayPause() {
                if (video.paused || video.ended) {
                    video.play();
                } else {
                    video.pause();
                }
            }

            function updatePlayPauseIcon() {
                if (video.paused || video.ended) {
                    playIcon.classList.remove('hidden');
                    pauseIcon.classList.add('hidden');
                } else {
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                }
            }

            playPauseBtn.addEventListener('click', togglePlayPause);
            video.addEventListener('click', togglePlayPause);
            video.addEventListener('play', updatePlayPauseIcon);
            video.addEventListener('pause', updatePlayPauseIcon);
            video.addEventListener('ended', updatePlayPauseIcon);

            // --- Volume/Mute Functionality ---
            function toggleMute() {
                video.muted = !video.muted;
            }

            function updateVolumeUI() {
                if (video.muted || video.volume === 0) {
                    volumeSlider.value = 0;
                    volumeHighIcon.classList.add('hidden');
                    volumeMuteIcon.classList.remove('hidden');
                } else {
                    volumeSlider.value = video.volume;
                    volumeHighIcon.classList.remove('hidden');
                    volumeMuteIcon.classList.add('hidden');
                }
            }

            function handleVolumeChange() {
                video.volume = volumeSlider.value;
                if (video.volume === 0) {
                    video.muted = true;
                } else {
                    video.muted = false;
                }
            }

            muteBtn.addEventListener('click', toggleMute);
            volumeSlider.addEventListener('input', handleVolumeChange);
            video.addEventListener('volumechange', updateVolumeUI);

            // --- Initial State Setup ---
            updatePlayPauseIcon();
            updateVolumeUI();
        });
    </script>

</body>
</html>
