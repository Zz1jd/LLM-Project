<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Calendar</title>
    <style>
        :root {
            --primary-color: #007bff;
            --light-gray: #f0f0f0;
            --dark-gray: #666;
            --border-color: #ddd;
            --today-highlight: #ffc107;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--light-gray);
            margin: 0;
            color: #333;
        }

        .calendar-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            box-sizing: border-box;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 500;
        }

        .calendar-header button {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--dark-gray);
            transition: color 0.2s;
            padding: 0 10px;
        }

        .calendar-header button:hover {
            color: var(--primary-color);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-name, .day-cell {
            text-align: center;
            padding: 10px 0;
            font-size: 0.9rem;
        }

        .day-name {
            font-weight: 600;
            color: var(--dark-gray);
        }

        .day-cell {
            border: 1px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
            line-height: 1.5;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .day-cell:not(.other-month):hover {
            background-color: var(--light-gray);
        }

        .other-month {
            color: #ccc;
            cursor: default;
        }

        .today {
            border: 1px solid var(--today-highlight);
            font-weight: bold;
        }

        .selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .selected:hover {
            background-color: #0056b3;
        }

        #selected-date-display {
            margin-top: 20px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary-color);
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prev-month">‹</button>
            <h2 id="month-year"></h2>
            <button id="next-month">›</button>
        </div>
        <div class="calendar-grid">
            <div class="day-name">Sun</div>
            <div class="day-name">Mon</div>
            <div class="day-name">Tue</div>
            <div class="day-name">Wed</div>
            <div class="day-name">Thu</div>
            <div class="day-name">Fri</div>
            <div class="day-name">Sat</div>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
        <p id="selected-date-display">Selected: None</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const monthYearDisplay = document.getElementById('month-year');
            const calendarDays = document.getElementById('calendar-days');
            const prevMonthBtn = document.getElementById('prev-month');
            const nextMonthBtn = document.getElementById('next-month');
            const selectedDateDisplay = document.getElementById('selected-date-display');

            let currentDate = new Date();

            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                monthYearDisplay.innerHTML = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

                calendarDays.innerHTML = '';

                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const daysInPrevMonth = new Date(year, month, 0).getDate();

                // Add days from the previous month
                for (let i = firstDayOfMonth; i > 0; i--) {
                    const dayCell = document.createElement('div');
                    dayCell.classList.add('day-cell', 'other-month');
                    dayCell.innerHTML = daysInPrevMonth - i + 1;
                    calendarDays.appendChild(dayCell);
                }

                // Add days for the current month
                const today = new Date();
                for (let i = 1; i <= daysInMonth; i++) {
                    const dayCell = document.createElement('div');
                    dayCell.classList.add('day-cell');
                    dayCell.innerHTML = i;
                    dayCell.dataset.date = new Date(year, month, i).toISOString();

                    if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                        dayCell.classList.add('today');
                    }
                    calendarDays.appendChild(dayCell);
                }
                
                // Add days from the next month to fill the grid
                const totalCells = calendarDays.children.length;
                const remainingCells = 42 - totalCells; // Ensure a 6-row grid
                for (let i = 1; i <= remainingCells; i++) {
                    const dayCell = document.createElement('div');
                    dayCell.classList.add('day-cell', 'other-month');
                    dayCell.innerHTML = i;
                    calendarDays.appendChild(dayCell);
                }
            }

            prevMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });

            nextMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });

            calendarDays.addEventListener('click', (e) => {
                const target = e.target;
                if (target.classList.contains('day-cell') && !target.classList.contains('other-month')) {
                    // Remove selection from previously selected cell
                    const prevSelected = calendarDays.querySelector('.selected');
                    if (prevSelected) {
                        prevSelected.classList.remove('selected');
                    }

                    // Add selection to the clicked cell
                    target.classList.add('selected');

                    // Update the display
                    const selectedDate = new Date(target.dataset.date);
                    selectedDateDisplay.innerHTML = `Selected: ${selectedDate.toDateString()}`;
                }
            });

            renderCalendar();
        });
    </script>

</body>
</html>
