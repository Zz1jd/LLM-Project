<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>
    <style>
        /* Basic Reset and Body Styling */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Carousel Container */
        .carousel-container {
            position: relative;
            max-width: 800px;
            width: 100%;
            margin: auto;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        /* Slides Wrapper */
        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        /* Individual Slide */
        .carousel-slide {
            min-width: 100%;
            position: relative;
        }

        .carousel-slide img {
            width: 100%;
            display: block;
            vertical-align: middle;
        }

        /* Navigation Buttons */
        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -28px;
            color: white;
            font-weight: bold;
            font-size: 22px;
            transition: 0.4s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover,
        .next:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        /* Dot Indicators */
        .carousel-dots {
            text-align: center;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        .dot {
            cursor: pointer;
            height: 13px;
            width: 13px;
            margin: 0 5px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.4s ease;
        }

        .active,
        .dot:hover {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="carousel-container">
        <div class="carousel-slides">
            <div class="carousel-slide">
                <img src="https://picsum.photos/id/10/800/450" alt="Forest path">
            </div>
            <div class="carousel-slide">
                <img src="https://picsum.photos/id/20/800/450" alt="Misty mountains">
            </div>
            <div class="carousel-slide">
                <img src="https://picsum.photos/id/30/800/450" alt="City skyline at night">
            </div>
            <div class="carousel-slide">
                <img src="https://picsum.photos/id/40/800/450" alt="Laptop on a desk">
            </div>
            <div class="carousel-slide">
                <img src="https://picsum.photos/id/50/800/450" alt="Ocean waves">
            </div>
        </div>

        <!-- Navigation Buttons -->
        <a class="prev">&#10094;</a>
        <a class="next">&#10095;</a>

        <!-- Dot indicators -->
        <div class="carousel-dots">
            <!-- Dots will be generated by JavaScript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Get DOM elements
            const slidesContainer = document.querySelector('.carousel-slides');
            const slides = document.querySelectorAll('.carousel-slide');
            const nextBtn = document.querySelector('.next');
            const prevBtn = document.querySelector('.prev');
            const dotsContainer = document.querySelector('.carousel-dots');

            let currentIndex = 0;
            const totalSlides = slides.length;

            // --- Create Dot Indicators ---
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('span');
                dot.classList.add('dot');
                // Add a data attribute to link dot to slide index
                dot.setAttribute('data-slide-to', i);
                dotsContainer.appendChild(dot);
            }

            // Get all created dots
            const dots = document.querySelectorAll('.dot');

            // --- Core Function to Update Carousel ---
            function updateCarousel() {
                // Move the slide container
                slidesContainer.style.transform = `translateX(-${currentIndex * 100}%)`;

                // Update active dot
                dots.forEach(dot => dot.classList.remove('active'));
                if (dots[currentIndex]) {
                    dots[currentIndex].classList.add('active');
                }
            }

            // --- Navigation Functions ---
            function showNextSlide() {
                currentIndex = (currentIndex + 1) % totalSlides;
                updateCarousel();
            }

            function showPrevSlide() {
                currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
                updateCarousel();
            }

            // --- Event Listeners ---
            nextBtn.addEventListener('click', showNextSlide);
            prevBtn.addEventListener('click', showPrevSlide);

            // Add click event to each dot
            dots.forEach(dot => {
                dot.addEventListener('click', () => {
                    currentIndex = parseInt(dot.getAttribute('data-slide-to'));
                    updateCarousel();
                });
            });
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    showNextSlide();
                } else if (e.key === 'ArrowLeft') {
                    showPrevSlide();
                }
            });

            // --- Initialize Carousel ---
            updateCarousel();
        });
    </script>

</body>
</html>
