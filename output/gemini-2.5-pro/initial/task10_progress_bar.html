<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Progress</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        .upload-container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        #fileInput {
            display: block;
            margin: 20px auto;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            width: calc(100% - 22px); /* Account for padding and border */
        }

        #uploadButton {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #uploadButton:hover {
            background-color: #2980b9;
        }
        
        #uploadButton:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .progress-container {
            width: 100%;
            background-color: #ecf0f1;
            border-radius: 25px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
            height: 30px;
            border: 1px solid #bdc3c7;
            display: none; /* Initially hidden */
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #3498db;
            border-radius: 25px;
            transition: width 0.2s linear, background-color 0.5s ease;
            text-align: center;
            line-height: 30px;
            color: white;
            font-weight: bold;
        }

        #statusMessage {
            margin-top: 20px;
            font-size: 1.1em;
            color: #27ae60;
            min-height: 24px; /* Reserve space to prevent layout shift */
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h1>File Upload Progress</h1>
        <input type="file" id="fileInput">
        <button id="uploadButton">Start Upload</button>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>
        <p id="statusMessage"></p>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadButton = document.getElementById('uploadButton');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const statusMessage = document.getElementById('statusMessage');

        uploadButton.addEventListener('click', () => {
            const file = fileInput.files[0];

            if (!file) {
                statusMessage.innerHTML = "Please select a file first!";
                statusMessage.style.color = '#e74c3c';
                return;
            }

            // Reset UI for a new upload
            uploadButton.disabled = true;
            statusMessage.innerHTML = '';
            statusMessage.style.color = '#27ae60';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            progressBar.style.backgroundColor = '#3498db';
            progressContainer.style.display = 'block';

            let progress = 0;
            const uploadInterval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 1; // Simulate variable upload speed
                if (progress > 100) {
                    progress = 100;
                }

                progressBar.style.width = progress + '%';
                progressBar.textContent = progress + '%';

                if (progress === 100) {
                    clearInterval(uploadInterval);
                    progressBar.style.backgroundColor = '#2ecc71';
                    statusMessage.innerHTML = `Upload of <strong>${file.name}</strong> complete!`;
                    uploadButton.disabled = false;
                }
            }, 100);
        });
    </script>

</body>
</html>
