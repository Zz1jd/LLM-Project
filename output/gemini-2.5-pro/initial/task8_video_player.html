<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        /* --- Basic Page Styles --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        /* --- Player Wrapper --- */
        .video-player-wrapper {
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        /* --- Video Container --- */
        .video-container {
            position: relative;
            background-color: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* --- Custom Controls --- */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
            padding: 15px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10+ */
            user-select: none;
        }

        .video-container:hover .controls {
            opacity: 1;
        }

        /* --- Control Buttons Base Style --- */
        .control-btn {
            cursor: pointer;
            color: white;
            margin: 0 12px;
            transition: transform 0.2s ease;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        /* --- Play Button (Triangle) --- */
        #play-btn {
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid white;
            background-color: transparent;
        }

        #play-btn:hover {
            border-left-color: #ffdd57;
        }

        /* --- Pause Button (Two bars) --- */
        #pause-btn {
            width: 20px;
            height: 24px;
            position: relative;
            display: none; /* Initially hidden */
        }

        #pause-btn::before,
        #pause-btn::after {
            content: '';
            position: absolute;
            top: 0;
            width: 7px;
            height: 24px;
            background-color: white;
            border-radius: 2px;
        }

        #pause-btn::before {
            left: 0;
        }

        #pause-btn::after {
            right: 0;
        }

        #pause-btn:hover::before,
        #pause-btn:hover::after {
            background-color: #ffdd57;
        }

        /* --- Mute Button --- */
        #mute-btn {
            font-size: 16px;
            font-weight: 500;
            padding: 5px 10px;
            border: 1px solid white;
            border-radius: 4px;
        }
        
        #mute-btn:hover {
            background-color: #ffdd57;
            color: #000;
            border-color: #ffdd57;
        }

        /* --- Video Title Display --- */
        #video-title {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="video-player-wrapper">
        <div class="video-container">
            <video id="custom-video" data-title="Big Buck Bunny Short Film">
                <!-- Using a common creative commons video for demonstration -->
                <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="controls">
                <div id="play-btn" class="control-btn" title="Play"></div>
                <div id="pause-btn" class="control-btn" title="Pause"></div>
                <div id="mute-btn" class="control-btn" title="Mute/Unmute">Mute</div>
            </div>
        </div>
        <p id="video-title"></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get DOM elements
            const video = document.getElementById('custom-video');
            const playBtn = document.getElementById('play-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const muteBtn = document.getElementById('mute-btn');
            const videoTitleDisplay = document.getElementById('video-title');

            /**
             * Displays the video title from the 'data-title' attribute
             * below the video player.
             */
            function displayVideoTitle() {
                const title = video.getAttribute('data-title');
                if (title) {
                    // Using innerHTML to set the content of the paragraph
                    videoTitleDisplay.innerHTML = `Now Playing: ${title}`;
                }
            }

            // --- Event Listeners for Custom Controls ---

            // Play button click event
            playBtn.addEventListener('click', () => {
                video.play();
            });

            // Pause button click event
            pauseBtn.addEventListener('click', () => {
                video.pause();
            });

            // Mute button click event
            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
            });


            // --- Event Listeners for the <video> Element ---

            // Update UI when the video starts playing
            video.addEventListener('play', () => {
                playBtn.style.display = 'none';
                pauseBtn.style.display = 'block';
                // Call the function to display the title when playback starts
                displayVideoTitle();
            });

            // Update UI when the video is paused
            video.addEventListener('pause', () => {
                playBtn.style.display = 'block';
                pauseBtn.style.display = 'none';
            });

            // Update mute button text when volume or muted state changes
            video.addEventListener('volumechange', () => {
                if (video.muted) {
                    muteBtn.innerHTML = 'Unmute';
                } else {
                    muteBtn.innerHTML = 'Mute';
                }
            });
        });
    </script>

</body>
</html>
