<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Item</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
        }
        .cart-item {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        .cart-item img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .cart-item h2 {
            font-size: 1.5rem;
            margin: 0 0 10px;
            color: #333;
        }
        .cart-item p {
            font-size: 1rem;
            margin: 0 0 15px;
            color: #555;
        }
        .cart-item .price {
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 15px;
        }
        .cart-item button {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .cart-item button:hover {
            background: #c0392b;
        }
        .cart-item .discount-section {
            margin-top: 15px;
        }
        .cart-item input[type="text"] {
            width: calc(100% - 90px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-right: 10px;
            font-size: 1rem;
        }
        .cart-item .apply-btn {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        .cart-item .apply-btn:hover {
            background: #2980b9;
        }
        .cart-item #msg {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="cart-item">
        <img src="https://via.placeholder.com/400x300" alt="Product Image">
        <h2>Product Title</h2>
        <p class="price">$49.99</p>
        <button onclick="removeItem()">Remove</button>
        <div class="discount-section">
            <input type="text" id="discountCode" placeholder="Enter discount code">
            <button class="apply-btn" onclick="applyDiscount()">Apply</button>
        </div>
        <div id="msg"></div>
    </div>

    <script>
        function removeItem() {
            alert('Item removed from cart!');
        }

        function applyDiscount() {
            const code = document.getElementById('discountCode').value.trim();
            if (code) {
                document.getElementById('msg').innerHTML = `Code <strong>${code}</strong> applied!`;
            } else {
                document.getElementById('msg').innerHTML = 'Please enter a valid discount code.';
            }
        }
    </script>
</body>
</html>
