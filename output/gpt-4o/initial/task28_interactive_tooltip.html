<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tooltip</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }

        .tooltip-container {
            position: relative;
            display: inline-block;
        }

        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            z-index: 10;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        .tooltip a {
            color: #4caf50;
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
        }

        .tooltip a:hover {
            text-decoration: underline;
        }

        .tooltip-container:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: #fff;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="tooltip-container">
        <button>Hover for info</button>
        <div class="tooltip">
            This is some helpful information.
            <a href="https://example.com" target="_blank">Learn more</a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tooltipContainer = document.querySelector('.tooltip-container');
            const tooltip = tooltipContainer.querySelector('.tooltip');

            tooltipContainer.addEventListener('mouseenter', () => {
                const containerRect = tooltipContainer.getBoundingClientRect();
                const tooltipRect = tooltip.getBoundingClientRect();

                const top = containerRect.top - tooltipRect.height - 10;
                const left = containerRect.left + (containerRect.width / 2) - (tooltipRect.width / 2);

                tooltip.style.top = `${top}px`;
                tooltip.style.left = `${left}px`;
            });
        });
    </script>
</body>
</html>
