<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            background: #000;
            position: relative;
        }
        video {
            width: 100%;
            display: block;
        }
        .controls {
            display: flex;
            justify-content: center;
            padding: 10px;
            background: #222;
        }
        .button {
            margin: 0 10px;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            user-select: none;
        }
        .button:hover {
            background: #0056b3;
        }
        .video-title {
            margin-top: 10px;
            font-size: 18px;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" src="sample-video.mp4" title="Sample Video"></video>
        <div class="controls">
            <div class="button" id="playButton">Play</div>
            <div class="button" id="pauseButton">Pause</div>
            <div class="button" id="muteButton">Mute</div>
        </div>
    </div>
    <div class="video-title" id="videoTitle"></div>

    <script>
        const video = document.getElementById('video');
        const playButton = document.getElementById('playButton');
        const pauseButton = document.getElementById('pauseButton');
        const muteButton = document.getElementById('muteButton');
        const videoTitle = document.getElementById('videoTitle');

        // Display the video title
        function updateVideoTitle() {
            videoTitle.innerHTML = `Now Playing: ${video.title}`;
        }

        // Play video
        playButton.addEventListener('click', () => {
            video.play();
            updateVideoTitle();
        });

        // Pause video
        pauseButton.addEventListener('click', () => {
            video.pause();
        });

        // Mute/Unmute video
        muteButton.addEventListener('click', () => {
            video.muted = !video.muted;
            muteButton.innerHTML = video.muted ? 'Unmute' : 'Mute';
        });
    </script>
</body>
</html>
