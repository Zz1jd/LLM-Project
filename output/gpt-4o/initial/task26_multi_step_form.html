<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Checkout Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .progress-bar div {
            width: 48%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            position: relative;
        }
        .progress-bar div.active {
            background: #4caf50;
        }
        .progress-bar div.active::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
        }
        .form-step {
            display: none;
        }
        .form-step.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
        }
        .buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .buttons button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .buttons .next {
            background: #4caf50;
            color: #fff;
        }
        .buttons .previous {
            background: #f44336;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div id="step1-indicator" class="active"></div>
            <div id="step2-indicator"></div>
        </div>
        <form id="checkout-form">
            <div id="step1" class="form-step active">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" placeholder="Enter your address" required>
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter your city" required>
                </div>
                <div class="form-group">
                    <label for="zip">ZIP Code</label>
                    <input type="text" id="zip" placeholder="Enter your ZIP code" required>
                </div>
            </div>
            <div id="step2" class="form-step">
                <div class="form-group">
                    <label for="card-number">Credit Card Number</label>
                    <input type="text" id="card-number" placeholder="Enter your credit card number" required>
                </div>
                <div class="form-group">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" placeholder="MM/YY" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" placeholder="Enter CVV" required>
                </div>
            </div>
            <div class="buttons">
                <button type="button" class="previous" id="prev-btn" disabled>Previous</button>
                <button type="button" class="next" id="next-btn">Next</button>
            </div>
        </form>
    </div>
    <script>
        const steps = document.querySelectorAll('.form-step');
        const indicators = document.querySelectorAll('.progress-bar div');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        let currentStep = 0;

        function updateFormSteps() {
            steps.forEach((step, index) => {
                step.classList.toggle('active', index === currentStep);
            });
            indicators.forEach((indicator, index) => {
                indicator.classList.toggle('active', index <= currentStep);
            });
            prevBtn.disabled = currentStep === 0;
            nextBtn.textContent = currentStep === steps.length - 1 ? 'Submit' : 'Next';
        }

        nextBtn.addEventListener('click', () => {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateFormSteps();
            } else {
                alert('Form submitted!');
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateFormSteps();
            }
        });

        updateFormSteps();
    </script>
</body>
</html>
