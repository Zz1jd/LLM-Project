<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Modal Dialog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #0072ed;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .modal h2 {
            margin: 0 0 10px;
            font-size: 24px;
            color: #333;
        }

        .modal p {
            margin: 0 0 20px;
            font-size: 16px;
            color: #666;
        }

        .modal button {
            background-color: #dc3545;
        }

        .modal button:hover {
            background-color: #a71d2a;
        }
    </style>
</head>
<body>
    <button id="openModalButton" aria-label="Open Modal">Open Modal</button>

    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-hidden="true" aria-labelledby="modalTitle" aria-describedby="modalDescription">
        <div class="modal">
            <h2 id="modalTitle">Modal Title</h2>
            <p id="modalDescription">This is the content of the modal dialog. You can close it by clicking the button below.</p>
            <button id="closeModalButton" aria-label="Close Modal">Close</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openModalButton = document.getElementById('openModalButton');
            const closeModalButton = document.getElementById('closeModalButton');
            const modalOverlay = document.getElementById('modalOverlay');

            openModalButton.addEventListener('click', () => {
                modalOverlay.style.display = 'flex';
                modalOverlay.setAttribute('aria-hidden', 'false');
                openModalButton.setAttribute('aria-expanded', 'true');
            });

            closeModalButton.addEventListener('click', () => {
                modalOverlay.style.display = 'none';
                modalOverlay.setAttribute('aria-hidden', 'true');
                openModalButton.setAttribute('aria-expanded', 'false');
            });

            modalOverlay.addEventListener('click', (event) => {
                if (event.target === modalOverlay) {
                    modalOverlay.style.display = 'none';
                    modalOverlay.setAttribute('aria-hidden', 'true');
                    openModalButton.setAttribute('aria-expanded', 'false');
                }
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && modalOverlay.getAttribute('aria-hidden') === 'false') {
                    modalOverlay.style.display = 'none';
                    modalOverlay.setAttribute('aria-hidden', 'true');
                    openModalButton.setAttribute('aria-expanded', 'false');
                }
            });
        });
    </script>
</body>
</html>
