<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .carousel {
            position: relative;
            width: 80%;
            max-width: 600px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .carousel-images {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .carousel-images img {
            width: 100%;
            display: block;
        }
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            z-index: 10;
        }
        .carousel-button.prev {
            left: 10px;
        }
        .carousel-button.next {
            right: 10px;
        }
        .carousel-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .carousel-dot {
            width: 12px;
            height: 12px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            cursor: pointer;
        }
        .carousel-dot.active {
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="carousel" aria-label="Image carousel">
        <div class="carousel-images">
            <img src="https://via.placeholder.com/600x400?text=Slide+1" alt="Slide 1">
            <img src="https://via.placeholder.com/600x400?text=Slide+2" alt="Slide 2">
            <img src="https://via.placeholder.com/600x400?text=Slide+3" alt="Slide 3">
        </div>
        <button class="carousel-button prev" aria-label="Previous slide">Previous</button>
        <button class="carousel-button next" aria-label="Next slide">Next</button>
        <div class="carousel-dots" role="tablist" aria-label="Carousel navigation dots">
            <button class="carousel-dot active" data-index="0" aria-label="Go to slide 1" role="tab" aria-selected="true"></button>
            <button class="carousel-dot" data-index="1" aria-label="Go to slide 2" role="tab" aria-selected="false"></button>
            <button class="carousel-dot" data-index="2" aria-label="Go to slide 3" role="tab" aria-selected="false"></button>
        </div>
    </div>
    <script>
        const carouselImages = document.querySelector('.carousel-images');
        const images = document.querySelectorAll('.carousel-images img');
        const prevButton = document.querySelector('.carousel-button.prev');
        const nextButton = document.querySelector('.carousel-button.next');
        const dots = document.querySelectorAll('.carousel-dot');

        let currentIndex = 0;

        function updateCarousel() {
            const offset = -currentIndex * 100;
            carouselImages.style.transform = `translateX(${offset}%)`;
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
                dot.setAttribute('aria-selected', index === currentIndex);
            });
        }

        function showNextSlide() {
            currentIndex = (currentIndex + 1) % images.length;
            updateCarousel();
        }

        function showPrevSlide() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateCarousel();
        }

        function jumpToSlide(index) {
            currentIndex = index;
            updateCarousel();
        }

        nextButton.addEventListener('click', showNextSlide);
        prevButton.addEventListener('click', showPrevSlide);

        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                const index = parseInt(dot.dataset.index, 10);
                jumpToSlide(index);
            });
        });

        updateCarousel();
    </script>
</body>
</html>
