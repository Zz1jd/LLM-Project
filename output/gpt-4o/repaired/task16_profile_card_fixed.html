<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .profile-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            width: 300px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .name {
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
        }
        .bio {
            font-size: 1em;
            color: #666;
            margin-bottom: 20px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .social-links a {
            text-decoration: none;
            font-size: 1.5em;
            color: #555;
            transition: color 0.3s ease;
        }
        .social-links a:hover {
            color: #0077b5;
        }
    </style>
</head>
<body>
    <div class="profile-card" aria-labelledby="profileCardTitle">
        <img src="https://via.placeholder.com/100" alt="User Avatar" class="avatar">
        <div class="name" id="userName" aria-label="User Name">John Doe</div>
        <div class="bio" id="userBio" aria-label="User Bio">Loading bio...</div>
        <div class="social-links" aria-label="Social Links">
            <a href="#" id="twitterLink" title="Twitter" aria-label="Twitter Profile">&#x1F426;</a>
            <a href="#" id="linkedinLink" title="LinkedIn" aria-label="LinkedIn Profile">&#x1F465;</a>
            <a href="#" id="githubLink" title="GitHub" aria-label="GitHub Profile">&#x1F5A5;</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = document.getElementById('userName');
            const userBio = document.getElementById('userBio');
            const twitterLink = document.getElementById('twitterLink');
            const linkedinLink = document.getElementById('linkedinLink');
            const githubLink = document.getElementById('githubLink');

            const userData = {
                name: "Jane Smith",
                bio: "Frontend Developer | JavaScript Enthusiast | Coffee Lover",
                social: {
                    twitter: "https://twitter.com/janesmith",
                    linkedin: "https://linkedin.com/in/janesmith",
                    github: "https://github.com/janesmith"
                }
            };

            userName.textContent = userData.name;
            userBio.textContent = userData.bio;
            twitterLink.setAttribute('href', userData.social.twitter);
            twitterLink.setAttribute('rel', 'noopener noreferrer');
            twitterLink.setAttribute('target', '_blank');
            linkedinLink.setAttribute('href', userData.social.linkedin);
            linkedinLink.setAttribute('rel', 'noopener noreferrer');
            linkedinLink.setAttribute('target', '_blank');
            githubLink.setAttribute('href', userData.social.github);
            githubLink.setAttribute('rel', 'noopener noreferrer');
            githubLink.setAttribute('target', '_blank');
        });
    </script>
</body>
</html>
