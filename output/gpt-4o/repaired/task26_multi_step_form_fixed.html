<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Checkout Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .progress-bar div {
            width: 48%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            position: relative;
        }
        .progress-bar div.active {
            background: #258829;
        }
        .progress-bar div.active::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #258829;
            border-radius: 50%;
        }
        .form-step {
            display: none;
        }
        .form-step.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
        }
        .buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .buttons button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .buttons .next {
            background: #258829;
            color: #fff;
        }
        .buttons .previous {
            background: #f44336;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar" role="progressbar" aria-label="Checkout Progress">
            <div id="step1-indicator" class="active" aria-hidden="true"></div>
            <div id="step2-indicator" aria-hidden="true"></div>
        </div>
        <form id="checkout-form" aria-labelledby="checkout-form-title">
            <h1 id="checkout-form-title" style="display:none;">Multi-Step Checkout Form</h1>
            <div id="step1" class="form-step active" aria-labelledby="step1-title">
                <h2 id="step1-title" style="display:none;">Step 1: Personal Information</h2>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" placeholder="Enter your address" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter your city" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="zip">ZIP Code</label>
                    <input type="text" id="zip" placeholder="Enter your ZIP code" required aria-required="true">
                </div>
            </div>
            <div id="step2" class="form-step" aria-labelledby="step2-title">
                <h2 id="step2-title" style="display:none;">Step 2: Payment Information</h2>
                <div class="form-group">
                    <label for="card-number">Credit Card Number</label>
                    <input type="text" id="card-number" placeholder="Enter your credit card number" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" placeholder="MM/YY" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" placeholder="Enter CVV" required aria-required="true">
                </div>
            </div>
            <div class="buttons">
                <button type="button" class="previous" id="prev-btn" disabled>Previous</button>
                <button type="button" class="next" id="next-btn">Next</button>
                <button type="submit" id="submit-btn" style="display:none;">Submit</button>
            </div>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const steps = document.querySelectorAll('.form-step');
            const indicators = document.querySelectorAll('.progress-bar div');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            const submitBtn = document.getElementById('submit-btn');
            let currentStep = 0;

            function updateFormSteps() {
                steps.forEach((step, index) => {
                    step.classList.toggle('active', index === currentStep);
                });
                indicators.forEach((indicator, index) => {
                    indicator.classList.toggle('active', index <= currentStep);
                });
                prevBtn.disabled = currentStep === 0;
                nextBtn.style.display = currentStep === steps.length - 1 ? 'none' : 'inline-block';
                submitBtn.style.display = currentStep === steps.length - 1 ? 'inline-block' : 'none';
            }

            nextBtn.addEventListener('click', () => {
                if (currentStep < steps.length - 1) {
                    currentStep++;
                    updateFormSteps();
                }
            });

            prevBtn.addEventListener('click', () => {
                if (currentStep > 0) {
                    currentStep--;
                    updateFormSteps();
                }
            });

            updateFormSteps();
        });
    </script>
</body>
</html>
