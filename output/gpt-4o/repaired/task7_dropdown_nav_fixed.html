<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Level Dropdown Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .nav {
            display: flex;
            background-color: #333;
            padding: 10px;
        }
        .nav-item {
            position: relative;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
        }
        .nav-item:hover {
            background-color: #444;
        }
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #444;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .dropdown .dropdown-item {
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            white-space: nowrap;
        }
        .dropdown .dropdown-item:hover {
            background-color: #555;
        }
        .nav-item:focus-within .dropdown,
        .nav-item:hover .dropdown {
            display: block;
        }
        .add-item-btn {
            margin: 20px;
            padding: 10px 20px;
            background-color: #0072ed;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .add-item-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="nav" role="navigation" aria-label="Main Navigation">
        <div class="nav-item" tabindex="0" aria-label="Home">Home</div>
        <div class="nav-item" tabindex="0" aria-haspopup="true" aria-expanded="false" aria-label="Products">
            Products
            <div class="dropdown" role="menu" aria-label="Products Menu">
                <div class="dropdown-item" role="menuitem" tabindex="0">Laptops</div>
                <div class="dropdown-item" role="menuitem" tabindex="0">Phones</div>
            </div>
        </div>
        <div class="nav-item" tabindex="0" aria-label="About">About</div>
    </div>
    <button class="add-item-btn" id="add-item-btn" aria-label="Add New Item">Add New Item</button>

    <script>
        document.getElementById('add-item-btn').addEventListener('click', function() {
            const dropdown = document.querySelector('.nav-item:nth-child(2) .dropdown');
            if (dropdown) {
                const newItem = document.createElement('div');
                newItem.className = 'dropdown-item';
                newItem.setAttribute('role', 'menuitem');
                newItem.setAttribute('tabindex', '0');
                newItem.textContent = 'New Item';
                dropdown.appendChild(newItem);
            }
        });
    </script>
</body>
</html>
