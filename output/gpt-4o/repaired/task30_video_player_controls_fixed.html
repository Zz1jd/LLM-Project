<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .video-player {
            width: 640px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        video {
            width: 100%;
            display: block;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #222;
            color: #fff;
        }
        .controls button {
            background: #444;
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .controls button:hover {
            background: #666;
        }
        .controls input[type="range"] {
            width: 100px;
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="video-player">
        <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" aria-label="Video player"></video>
        <div class="controls">
            <button id="playPauseBtn" aria-label="Play or Pause Video">Play</button>
            <button id="muteBtn" aria-label="Mute or Unmute Video">Mute</button>
            <label for="volumeSlider" class="visually-hidden">Volume Control</label>
            <input id="volumeSlider" type="range" min="0" max="1" step="0.1" value="1" aria-label="Volume Control">
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('video');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const muteBtn = document.getElementById('muteBtn');
            const volumeSlider = document.getElementById('volumeSlider');

            playPauseBtn.addEventListener('click', () => {
                if (video.paused) {
                    video.play();
                    playPauseBtn.textContent = 'Pause';
                } else {
                    video.pause();
                    playPauseBtn.textContent = 'Play';
                }
            });

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                muteBtn.textContent = video.muted ? 'Unmute' : 'Mute';
            });

            volumeSlider.addEventListener('input', () => {
                video.volume = volumeSlider.value;
            });
        });
    </script>
</body>
</html>
